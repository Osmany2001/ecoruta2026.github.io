<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoRuta - Contratar</title>
    <link rel="stylesheet" href="estilo.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <span>EcoRuta</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="flota.html">Flota</a></li>
                <li><a href="contratar.html" class="active">Contratar</a></li>
                <li><a href="acerca.html">Acerca de</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <section class="contratar">
        <h2>Contrata tu servicio</h2>
        
        <!-- TEXTO CORREGIDO: alineado a la izquierda y con mejor espaciado -->
        <p class="contratar-descripcion">
            Completa el formulario y te contactaremos para coordinar tu traslado.
        </p>

        <!-- Métodos de pago destacados -->
        <div class="metodos-pago-destacados">
            <div class="metodo-pago-item">
                <img src="img/Transfermovil.jfif" alt="Transfermóvil" />
                <span><strong>Transfermóvil</strong></span>
            </div>
            <div class="metodo-pago-item">
                <img src="img/Enzona.jfif" alt="Enzona" />
                <span><strong>Enzona</strong></span>
            </div>
            <div class="metodo-pago-item">
                <i class="fas fa-dollar-sign"></i>
                <span><strong>USD</strong></span>
            </div>
        </div>

        <form id="contrato-form">
            <div class="form-group">
                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required />
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono *</label>
                <input type="text" id="telefono" placeholder="Ej: 53 24 1234 5678" required />
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" />
            </div>
            <div class="form-group">
                <label for="origen">Origen *</label>
                <input type="text" id="origen" placeholder="Ej: Aeropuerto Holguín" required />
            </div>
            <div class="form-group">
                <label for="destino">Destino *</label>
                <input type="text" id="destino" placeholder="Ej: Hotel Brisas Guardalavaca" required />
            </div>
            <div class="form-group">
                <label for="fecha">Fecha del servicio *</label>
                <input type="date" id="fecha" required />
            </div>
            <div class="form-group">
                <label for="pasajeros">Número de pasajeros *</label>
                <input type="number" id="pasajeros" min="1" max="40" placeholder="Ej: 10" required />
            </div>
            <div class="form-group">
                <label for="tipo">Tipo de servicio *</label>
                <select id="tipo" required>
                    <option value="">Seleccione...</option>
                    <option value="corporativo">Corporativo (USD)</option>
                    <option value="empresarial">Empresarial (CUP)</option>
                    <option value="grupo">Grupo</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mensaje">Observaciones</label>
                <textarea id="mensaje" rows="3" placeholder="Detalles adicionales..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-paper-plane"></i> Enviar solicitud
            </button>
        </form>

        <div id="mensaje-confirmacion" style="display: none; margin-top: 20px; padding: 15px; background: #d4edda; color: #155724; border-radius: 8px;">
            <i class="fas fa-check-circle"></i> ¡Solicitud enviada! Te contactaremos pronto.
        </div>
    </section>

    <footer>
        <p>&copy; 2026 EcoRuta. Transporte Ecológico en Holguín.</p>
        <div class="social">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
