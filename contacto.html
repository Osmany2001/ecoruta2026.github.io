<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoRuta - Contacto</title>
    <link rel="stylesheet" href="estilo.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <span>EcoRuta</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="flota.html">Flota</a></li>
                <li><a href="contratar.html">Contratar</a></li>
                <li><a href="acerca.html">Acerca de</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <section class="contacto">
        <h2>Contáctanos</h2>
        <div class="contacto-info">
            <div>
                <i class="fas fa-map-marker-alt"></i>
                <p><strong>Holguín, Cuba</strong></p>
            </div>
            <div>
                <i class="fas fa-phone-alt"></i>
                <p><strong>+53 63442363</strong></p>
            </div>
            <div>
                <i class="fas fa-envelope"></i>
                <p><strong>info@ecoruta.com</strong></p>
            </div>
        </div>

        <!-- Métodos de pago en contacto -->
        <div style="margin-top: 40px; text-align: center;">
            <h3 style="color: #0f3b1e; margin-bottom: 20px;">Métodos de Pago</h3>
            <div class="pagos-grid" style="max-width: 600px; margin: 0 auto;">
                <div class="pago-card">
                    <img src="img/Transfermovil.jfif" alt="Transfermóvil" class="logo-pago" />
                    <p><strong>Transfermóvil</strong></p>
                </div>
                <div class="pago-card">
                    <img src="img/Enzona.jfif" alt="Enzona" class="logo-pago" />
                    <p><strong>Enzona</strong></p>
                </div>
                <div class="pago-card">
                    <i class="fas fa-dollar-sign icono-dolar"></i>
                    <p><strong>USD</strong></p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 EcoRuta. Transporte Ecológico en Holguín.</p>
        <div class="social">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
